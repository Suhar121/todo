name: React — Build · Push · Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  APP_NAME: todo
  APP_PORT: 3000
  HOST_PORT: 80

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare lowercase GHCR image name
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          APP_LC="${APP_NAME,,}"
          echo "IMAGE=ghcr.io/${OWNER_LC}/${APP_LC}" >> "$GITHUB_ENV"

      - name: Resolve Docker build context
        id: dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "context=." >> "$GITHUB_OUTPUT"
            echo "file=./Dockerfile" >> "$GITHUB_OUTPUT"
          elif [ -f frontend/Dockerfile ]; then
            echo "context=./frontend" >> "$GITHUB_OUTPUT"
            echo "file=./frontend/Dockerfile" >> "$GITHUB_OUTPUT"
          elif [ -f backend/Dockerfile ]; then
            echo "context=./backend" >> "$GITHUB_OUTPUT"
            echo "file=./backend/Dockerfile" >> "$GITHUB_OUTPUT"
          else
            echo "No Dockerfile found. Expected ./Dockerfile, ./frontend/Dockerfile, or ./backend/Dockerfile" >&2
            exit 1
          fi

      # -- Build --------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests (if present)
        run: npm test --if-present

      - name: Build
        run: npm run build

      # -- Registry login --------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.dockerfile.outputs.context }}
          file: ${{ steps.dockerfile.outputs.file }}
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      # -- SSH deployment --------------------------------------------------
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull ${{ env.IMAGE }}:latest
            docker stop ${{ env.APP_NAME }} || true
            docker rm ${{ env.APP_NAME }} || true
            docker run -d --name ${{ env.APP_NAME }} --restart unless-stopped -p ${{ env.HOST_PORT }}:${{ env.APP_PORT }} ${{ env.IMAGE }}:latest
            docker image prune -f
